name: Universal Agent OS CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Compile backend
        run: |
          python -m py_compile backend/sync_markdown_to_uipath.py backend/uipath_api_connector.py

      - name: Run tests
        run: |
          pytest -q

      - name: Verify required evidence files
        run: |
          test -f README.md
          test -f LICENSE
          test -f docs/architecture_bpmn.mermaid
          test -f docs/evidence_manifest.md
          test -f docs/devpost_submission_update.md
          test -f uipath_project/entities/code_soul.json
          test -f uipath_project/entities/minefield_history.json
          test -f uipath_project/entities/state_memory.json
          test -f uipath_project/entities/persona.json
